<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compra confirmada — Ateliê 3D</title>
  <meta name="theme-color" content="#7B4DCC" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div style="text-align: center; max-width: 380px;">
      <div id="iconeStatus" style="font-size: 60px; margin-bottom: 10px;">⏳</div>
      <h1 id="tituloStatus" style="font-family: var(--fonte-display); font-size: 23px; margin-bottom: 6px;">
        Verificando pagamento…
      </h1>
      <p id="resumoPedido" style="color: var(--roxo-escuro); font-weight: 700; font-size: 15px; margin-bottom: 4px;"></p>
      <p id="formaPagamento" style="color: var(--texto-suave); font-size: 12.5px; margin-bottom: 14px;"></p>
      <p id="mensagemRetirada" style="color: var(--texto-suave); font-size: 14px; line-height: 1.6; margin-bottom: 22px; display: none;">
        🔑 <strong style="color: var(--texto);">Retire seus chaveiros</strong> no balcão da Ateliê 3D.
        Qualquer dúvida, chama no WhatsApp!
      </p>
      <a class="btn-primario" style="display: inline-block; text-decoration: none; margin-bottom: 10px;" href="index.html">
        Voltar para a loja
      </a>
      <a id="linkComprovante" class="btn-secundario" style="display: none; text-decoration: none;" href="#" target="_blank" rel="noopener">
        Ver comprovante de pagamento
      </a>
    </div>
  </div>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const qtd = parseInt(params.get("qtd"), 10);
      const total = parseFloat(params.get("total"));
      const handle = params.get("handle");
      const receiptUrl = params.get("receipt_url");
      const captureMethod = params.get("capture_method");
      const orderNsu = params.get("order_nsu");
      const transactionNsu = params.get("transaction_nsu");
      const slug = params.get("slug");

      const elIcone = document.getElementById("iconeStatus");
      const elTitulo = document.getElementById("tituloStatus");
      const elResumo = document.getElementById("resumoPedido");
      const elForma = document.getElementById("formaPagamento");
      const elRetirada = document.getElementById("mensagemRetirada");
      const elComprovante = document.getElementById("linkComprovante");

      if (qtd && !Number.isNaN(total)) {
        const totalFormatado = total.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
        elResumo.textContent = `${qtd} chaveiro${qtd === 1 ? "" : "s"} · ${totalFormatado}`;
      } else {
        elResumo.textContent = "";
      }

      if (captureMethod) {
        const nomes = { pix: "Pago via Pix", credit_card: "Pago no cartão de crédito" };
        elForma.textContent = nomes[captureMethod] || "";
      }

      if (receiptUrl) {
        elComprovante.href = receiptUrl;
        elComprovante.style.display = "inline-block";
      }

      function mostrarConfirmado() {
        elIcone.textContent = "✅";
        elTitulo.textContent = "Compra confirmada!";
        elRetirada.style.display = "block";
        try { localStorage.clear(); } catch (_) {}
      }

      function mostrarNaoConfirmado(mensagem) {
        elIcone.textContent = "⚠️";
        elTitulo.textContent = "Pagamento não confirmado";
        elForma.textContent = mensagem || "Apresente o comprovante no balcão para conferência.";
        elRetirada.style.display = "none";
      }

      if (!handle || !orderNsu || !transactionNsu || !slug) {
        mostrarNaoConfirmado("Faltaram dados para confirmar automaticamente. Apresente o comprovante no balcão.");
        return;
      }

      try {
        const resposta = await fetch("/api/payment-check", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            handle,
            order_nsu: orderNsu,
            transaction_nsu: transactionNsu,
            slug,
          }),
        });

        const dados = await resposta.json().catch(() => ({}));
        if (!resposta.ok) throw new Error(dados.error || "Falha na confirmação.");

        if (dados.success === true && dados.paid === true) {
          mostrarConfirmado();
        } else {
          mostrarNaoConfirmado("O pagamento ainda não foi confirmado. Apresente o comprovante no balcão.");
        }
      } catch (erro) {
        console.error(erro);
        mostrarNaoConfirmado("Não foi possível confirmar automaticamente. Apresente o comprovante no balcão.");
      }
    })();
  </script>
</body>
</html>
