<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compra confirmada — Ateliê 3D</title>
  <meta name="theme-color" content="#7B4DCC" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div style="text-align: center; max-width: 380px;">
      <div style="font-size: 60px; margin-bottom: 10px;">✅</div>
      <h1 style="font-family: var(--fonte-display); font-size: 23px; margin-bottom: 6px;">
        Compra confirmada!
      </h1>
      <p id="resumoPedido" style="color: var(--roxo-escuro); font-weight: 700; font-size: 15px; margin-bottom: 4px;"></p>
      <p id="formaPagamento" style="color: var(--texto-suave); font-size: 12.5px; margin-bottom: 14px;"></p>
      <p style="color: var(--texto-suave); font-size: 14px; line-height: 1.6; margin-bottom: 22px;">
        🔑 <strong style="color: var(--texto);">Retire seus chaveiros</strong> no balcão da Ateliê 3D.
        Qualquer dúvida, chama no WhatsApp!
      </p>
      <a class="btn-primario" style="display: inline-block; text-decoration: none; margin-bottom: 10px;" href="index.html">
        Voltar para a loja
      </a>
      <a id="linkComprovante" class="btn-secundario" style="display: none; text-decoration: none;" href="#" target="_blank" rel="noopener">
        Ver comprovante de pagamento
      </a>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const ENDPOINT_PAYMENT_CHECK =
        "https://api.infinitepay.io/invoices/public/checkout/payment_check";
      const params = new URLSearchParams(window.location.search);

      const qtd = Number.parseInt(params.get("qtd"), 10);
      const total = Number.parseFloat(params.get("total"));
      const handle = (params.get("handle") || "").replace(/^\$/, "");
      const receiptUrl = params.get("receipt_url");
      const captureMethod = params.get("capture_method");
      const orderNsu = params.get("order_nsu");
      const transactionNsu = params.get("transaction_nsu");
      const slug = params.get("slug");

      const icone = document.querySelector("body > div > div > div");
      const titulo = document.querySelector("h1");
      const elResumo = document.getElementById("resumoPedido");
      const elForma = document.getElementById("formaPagamento");
      const elComprovante = document.getElementById("linkComprovante");
      const textoRetirada = titulo.parentElement.querySelectorAll("p")[2];

      function preencherDetalhes() {
        if (qtd > 0 && Number.isFinite(total)) {
          const totalFormatado = total.toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL",
          });
          elResumo.textContent = `${qtd} chaveiro${qtd === 1 ? "" : "s"} · ${totalFormatado}`;
        } else {
          elResumo.textContent = "";
        }

        const formas = {
          pix: "Pago via Pix",
          credit_card: "Pago no cartão de crédito",
        };
        elForma.textContent = formas[captureMethod] || "";

        if (receiptUrl) {
          try {
            const comprovante = new URL(receiptUrl);
            if (comprovante.protocol === "https:") {
              elComprovante.href = comprovante.toString();
              elComprovante.style.display = "inline-block";
            }
          } catch (_) {
            elComprovante.style.display = "none";
          }
        }
      }

      function mostrarConfirmado() {
        document.title = "Compra confirmada — Ateliê 3D";
        icone.textContent = "✅";
        titulo.textContent = "Compra confirmada!";
        textoRetirada.innerHTML =
          '🔑 <strong style="color: var(--texto);">Retire seus chaveiros</strong> no balcão da Ateliê 3D. Qualquer dúvida, chama no WhatsApp!';
      }

      function mostrarVerificando() {
        document.title = "Confirmando pagamento — Ateliê 3D";
        icone.textContent = "⏳";
        titulo.textContent = "Confirmando pagamento…";
        textoRetirada.textContent = "Aguarde enquanto verificamos a confirmação da InfinitePay.";
      }

      function mostrarNaoConfirmado() {
        document.title = "Pagamento não confirmado — Ateliê 3D";
        icone.textContent = "⚠️";
        titulo.textContent = "Pagamento ainda não confirmado";
        textoRetirada.textContent =
          "Não retire o pedido ainda. Aguarde alguns instantes e recarregue esta página ou apresente o comprovante ao atendente.";
      }

      async function confirmarPagamento() {
        if (!handle || !orderNsu || !transactionNsu || !slug) {
          mostrarNaoConfirmado();
          return;
        }

        mostrarVerificando();

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);

        try {
          const resposta = await fetch(ENDPOINT_PAYMENT_CHECK, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({
              handle,
              order_nsu: orderNsu,
              transaction_nsu: transactionNsu,
              slug,
            }),
            signal: controller.signal,
          });

          if (!resposta.ok) {
            mostrarNaoConfirmado();
            return;
          }

          const dados = await resposta.json();
          if (dados && dados.success === true && dados.paid === true) {
            mostrarConfirmado();
          } else {
            mostrarNaoConfirmado();
          }
        } catch (erro) {
          console.error("Falha ao confirmar pagamento:", erro);
          mostrarNaoConfirmado();
        } finally {
          clearTimeout(timeout);
        }
      }

      preencherDetalhes();
      confirmarPagamento();
    })();
  </script>
</body>
</html>
